version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: learnmate_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: learnmate_ai
    networks:
      - learnmate_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: learnmate_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/learnmate_ai
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: 7d
      WATSONX_API_KEY: ${WATSONX_API_KEY}
      WATSONX_PROJECT_ID: ${WATSONX_PROJECT_ID}
      WATSONX_URL: ${WATSONX_URL:-https://us-south.ml.cloud.ibm.com}
      WATSONX_MODEL_ID: ${WATSONX_MODEL_ID:-ibm/granite-13b-chat-v2}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      - mongodb
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    networks:
      - learnmate_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: learnmate_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - learnmate_network

volumes:
  mongodb_data:

networks:
  learnmate_network:
    driver: bridge
